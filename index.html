const CountdownRing=({onDone})=>{
  const [n,setN]=useState(3);
  useEffect(()=>{
    if(n===0){onDone();return;}
    const t=setTimeout(()=>setN(c=>c-1),800);
    return()=>clearTimeout(t);
  },[n]);
  return(
    <div style={{position:"fixed",inset:0,zIndex:200,background:"rgba(18,13,16,0.96)",backdropFilter:"blur(14px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",animation:"fadeUp 0.4s ease"}}>

const trackFromParticipant=(participant,kind)=>{
  if(!participant)return null;
  return participant.tracks?.[kind]?.persistentTrack||participant.tracks?.[kind]?.track||participant[`${kind}Track`]||null;
};

const DailyLiveRoom=({url,name,matchedName,blurAmount,activeQuestion,activeQuestionIndex})=>{
  const callRef=useRef(null);
  const mainVideoRef=useRef(null);
  const localVideoRef=useRef(null);
  const audioRef=useRef(null);
  const [participants,setParticipants]=useState({});
  const [status,setStatus]=useState("joining");

  useEffect(()=>{
    if(!url||!window.DailyIframe)return;
    let active=true;
    const call=window.DailyIframe.createCallObject({subscribeToTracksAutomatically:true});
    callRef.current=call;
    const update=()=>{if(active)setParticipants({...call.participants()});};
    call
      .on("joined-meeting",()=>{setStatus("joined");update();})
      .on("participant-joined",update)
      .on("participant-updated",update)
      .on("participant-left",update)
      .on("track-started",update)
      .on("track-stopped",update)
      .on("error",()=>setStatus("error"))
      .on("left-meeting",()=>setStatus("left"));
    call.join({url,userName:name||"Guest"}).catch(()=>setStatus("error"));
    return()=>{
      active=false;
      call.leave().catch(()=>{}).finally(()=>call.destroy().catch(()=>{}));
      callRef.current=null;
    };
  },[url,name]);

  const allParticipants=Object.values(participants);
  const localParticipant=allParticipants.find(p=>p.local);
  const remoteParticipant=allParticipants.find(p=>!p.local&&trackFromParticipant(p,"video"));
  const featuredParticipant=remoteParticipant||localParticipant;

  useEffect(()=>{
    const videoTrack=trackFromParticipant(featuredParticipant,"video");
    if(mainVideoRef.current&&videoTrack){
      mainVideoRef.current.srcObject=new MediaStream([videoTrack]);
      mainVideoRef.current.play?.().catch(()=>{});
    }
    const audioTrack=trackFromParticipant(remoteParticipant,"audio");
    if(audioRef.current&&audioTrack){
      audioRef.current.srcObject=new MediaStream([audioTrack]);
      audioRef.current.play?.().catch(()=>{});
    }
  },[participants,featuredParticipant?.session_id,remoteParticipant?.session_id]);

  useEffect(()=>{
    const localTrack=trackFromParticipant(localParticipant,"video");
    if(localVideoRef.current&&localTrack){
      localVideoRef.current.srcObject=new MediaStream([localTrack]);
      localVideoRef.current.play?.().catch(()=>{});
    }
  },[participants,localParticipant?.session_id]);

  return(
    <>
      <video ref={mainVideoRef} autoPlay playsInline muted={!remoteParticipant} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",background:"#080608",filter:`blur(${blurAmount*0.32}px)`,transition:"filter 1.4s ease",zIndex:1}}/>
      <audio ref={audioRef} autoPlay playsInline/>
      {!featuredParticipant&&(
        <div style={{position:"absolute",inset:0,zIndex:1,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(175deg,rgba(28,20,25,0.96),rgba(18,13,16,0.98))",fontFamily:body,fontStyle:"italic",fontSize:15,color:T.muted,textAlign:"center",padding:30}}>
          {status==="error"?"Video room could not connect. Refresh and try again.":"Opening the real video room..."}
        </div>
      )}
      <div style={{position:"absolute",top:14,left:14,right:14,zIndex:5,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,pointerEvents:"none"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:100,background:"rgba(18,13,16,0.76)",backdropFilter:"blur(8px)",border:"1px solid rgba(196,146,138,0.22)",fontFamily:sans,fontSize:10,fontWeight:600,letterSpacing:"0.14em",color:"rgba(245,236,230,0.84)"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:T.rose,animation:"liveGlow 1.6s ease-in-out infinite",display:"inline-block"}}/>
          REAL MATCH
        </div>
        <div style={{padding:"6px 10px",borderRadius:100,background:"rgba(18,13,16,0.72)",backdropFilter:"blur(8px)",border:"1px solid rgba(122,181,201,0.2)",fontFamily:sans,fontSize:10,color:"rgba(223,247,247,0.78)",maxWidth:170,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
          {remoteParticipant?matchedName||"Nearby match":"Waiting for video"}
        </div>
      </div>
      <div key={activeQuestionIndex} style={{position:"absolute",top:58,left:18,right:112,padding:"12px 14px",borderRadius:15,background:"rgba(18,13,16,0.68)",backdropFilter:"blur(14px)",border:"1px solid rgba(196,146,138,0.16)",boxShadow:"0 10px 34px rgba(0,0,0,0.35)",animation:"fadeUp 0.35s ease",zIndex:5,pointerEvents:"none"}}>

function App(){

  });

    catch(err){return DEFAULT_ACCOUNT;}
  });
  const [showAccountSetup,setShowAccountSetup]=useState(false);
  const [accountNotice,setAccountNotice]=useState("");

  const [revealAccess,setRevealAccess]=useState(()=>{
    try{
      const saved={...DEFAULT_ACCESS,...JSON.parse(localStorage.getItem("charismaRevealAccess")||"{}")};
      return Date.now()-saved.windowStart>=ACCESS_RESET_MS?DEFAULT_ACCESS:saved;
    }catch(err){return DEFAULT_ACCESS;}
  });
  const [accessNotice,setAccessNotice]=useState("");
  const [coins,setCoins]=useState(()=>Number(userProfile.wallet)||1200);
  const [profile,setProfile]=useState(PROFILES[0]);
  const [kept,setKept]=useState([]);
  const [showGifts,setShowGifts]=useState(false);
  const [showDatePlanner,setShowDatePlanner]=useState(false);
  const [floating,setFloating]=useState([]);
  const [sentGifts,setSentGifts]=useState([]);
  const [pulseRing,setPulseRing]=useState(false);
  const [selectedRest,setSelectedRest]=useState(null);
  const [restaurants,setRestaurants]=useState(RESTAURANTS);
  const [restaurantStatus,setRestaurantStatus]=useState("idle");
  const [restaurantError,setRestaurantError]=useState("");
  const [selectedTime,setSelectedTime]=useState(null);
  const [bookingDate,setBookingDate]=useState("Tonight");
  const [bookingParty,setBookingParty]=useState(2);
  const [bookingDone,setBookingDone]=useState(false);
  const [datePlans,setDatePlans]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("charismaDatePlans")||"[]");}
    catch(err){return [];}
  });
  const [cameraStatus,setCameraStatus]=useState("idle");
  const [cameraError,setCameraError]=useState("");
  const [language,setLanguage]=useState("");
  const [region,setRegion]=useState("");
  const [locationStatus,setLocationStatus]=useState("idle");
  const [locationError,setLocationError]=useState("");
  const [location,setLocation]=useState(null);
  const [matchStatus,setMatchStatus]=useState("idle");
  const [matchError,setMatchError]=useState("");
  const [matchRoom,setMatchRoom]=useState("");
  const [matchCallUrl,setMatchCallUrl]=useState("");
  const [matchedProfileName,setMatchedProfileName]=useState("");
  const [backgroundVideoIndex,setBackgroundVideoIndex]=useState(0);
  const [legalModal,setLegalModal]=useState(null);
  const [safetyNotice,setSafetyNotice]=useState("");
  const [blockedProfiles,setBlockedProfiles]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("charismaBlockedProfiles")||"[]");}
    catch(err){return [];}
  });
  const timerRef=useRef(null);
  const blurRef=useRef(null);
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const matchUnsubRef=useRef(null);

  useEffect(()=>{
    if(screen!=="call")return;
    setCallTime(0);setBlurAmount(INITIAL_REVEAL_BLUR);setRevealMsg(null);
    timerRef.current=setInterval(()=>setCallTime(t=>t+1),1000);
    blurRef.current=setInterval(()=>{
      setBlurAmount(prev=>{
        const next=Math.max(0,prev-REVEAL_BLUR_STEP);
        if(prev>0&&next===0)setRevealMsg("the moment has arrived");
        return next;
      });
    },1000);
    return()=>{clearInterval(timerRef.current);clearInterval(blurRef.current);};
  },[screen,profile]);

  useEffect(()=>{
    if(!revealMsg)return;
    const t=setTimeout(()=>setRevealMsg(null),3200);
    return()=>clearTimeout(t);
  },[revealMsg]);

  useEffect(()=>()=>{matchUnsubRef.current?.();},[]);

  const attachCameraStream=()=>{
    if(videoRef.current&&streamRef.current){
      videoRef.current.srcObject=streamRef.current;
      videoRef.current.play?.().catch(()=>{});
    }
  };

  const cameraIsLive=()=>Boolean(streamRef.current&&streamRef.current.getVideoTracks().some(track=>track.readyState==="live"));

  useEffect(()=>{
    attachCameraStream();
  },[screen,cameraStatus]);

  useEffect(()=>{
    const saved={...userProfile,wallet:coins};
    localStorage.setItem("charismaProfile",JSON.stringify(saved));
  },[userProfile,coins]);

  useEffect(()=>{
    const services=getFirebaseServices();
    if(!services)return;
    setAuthProvider("firebase");
    const unsubscribe=services.auth.onAuthStateChanged(authUser=>{
      if(!authUser?.email)return;
      setUserProfile(p=>({...p,email:authUser.email,hasAccount:true}));
      setProfileDraft(p=>({...p,email:authUser.email,hasAccount:true}));
    });
    return()=>unsubscribe?.();
  },[]);

  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const paid=params.get("paid");
    if(!paid)return;
    if(paid==="membership"){
      const next={...userProfile,isMember:true};
      setUserProfile(next);
      setProfileDraft(p=>({...p,isMember:true}));
      localStorage.setItem("charismaProfile",JSON.stringify(next));
      setShowAccountSetup(true);
      setAccessNotice("Membership activated. Create your Charisma account to keep up with gifts and Grace Points.");
    }else{
      const pack=GRACE_PACKS.find(p=>p.id===paid);
      if(pack){
        setCoins(c=>c+pack.points);
        setAccessNotice(`${pack.label} added to your wallet.`);
      }
    }
    params.delete("paid");
    const clean=`${window.location.pathname}${params.toString()?`?${params.toString()}`:""}${window.location.hash}`;
    window.history.replaceState(null,"",clean||"/");
  },[]);

  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const isWoman=userProfile.role==="Woman";
  const isMember=Boolean(userProfile.isMember);
  const accessExpired=Date.now()-revealAccess.windowStart>=ACCESS_RESET_MS;
  const activeAccess=accessExpired?DEFAULT_ACCESS:revealAccess;
  const freeCallsLeft=Math.max(0,FREE_REVEAL_LIMIT-activeAccess.callsUsed);
  const hasUnlimitedAccess=isWoman||isMember;
  const canStartReveal=hasUnlimitedAccess||freeCallsLeft>0;
  const profileComplete=Boolean(userProfile.name&&userProfile.age&&userProfile.city&&userProfile.role);
  const memberNeedsAccount=Boolean(userProfile.isMember&&!userProfile.hasAccount);

  const saveProfile=()=>{
    const next={
      ...userProfile,
      name:String(profileDraft.name||"").trim(),
      age:String(profileDraft.age||"").trim(),
      city:String(profileDraft.city||"").trim(),
      role:profileDraft.role||"",
      intent:profileDraft.intent||"Real dates",
      isMember:Boolean(profileDraft.isMember),
      wallet:Number(profileDraft.wallet)||coins||1200
    };
    setUserProfile(next);
    setCoins(next.wallet);
    localStorage.setItem("charismaProfile",JSON.stringify(next));
  };

  const hashPassword=async(password,email)=>{
    const text=`charisma-live:${email}:${password}`;
    if(window.crypto?.subtle){
      const bytes=await window.crypto.subtle.digest("SHA-256",new TextEncoder().encode(text));
      return Array.from(new Uint8Array(bytes)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
    return btoa(text);
  };

  const saveMemberAccount=async()=>{
    const email=String(accountDraft.email||"").trim().toLowerCase();
    const password=String(accountDraft.password||"");
    if(!email.includes("@")||password.length<6){
      setAccountNotice("Use a real email and a password with at least 6 characters.");
      return;
    }
    setAccountNotice("Creating your account...");
    const services=getFirebaseServices();
    let betaAccount={email,passwordHash:await hashPassword(password,email),createdAt:new Date().toISOString(),provider:"local"};
    if(services){
      try{
        const credential=await services.auth.createUserWithEmailAndPassword(email,password);
        const authUser=credential.user;
        await authUser.updateProfile({displayName:userProfile.name||profileDraft.name||"Charisma member"});
        await services.db.collection("members").doc(authUser.uid).set({
          email,
          displayName:userProfile.name||profileDraft.name||"",
          city:userProfile.city||profileDraft.city||"",
          role:userProfile.role||profileDraft.role||"",
          intent:userProfile.intent||profileDraft.intent||"Real dates",
          wallet:coins,
          isMember:true,
          giftsSent:userProfile.giftsSent||[],
          giftsReceived:userProfile.giftsReceived||[],
          updatedAt:window.firebase.firestore.FieldValue.serverTimestamp(),
          createdAt:window.firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true});
        betaAccount={email,firebaseUid:authUser.uid,createdAt:new Date().toISOString(),provider:"firebase"};
        setAuthProvider("firebase");
      }catch(error){
        setAccountNotice(error.message||"Firebase account setup failed. Try again.");
        return;
      }
    }
    localStorage.setItem("charismaAccount",JSON.stringify(betaAccount));
    const next={...userProfile,email,hasAccount:true,isMember:true};
    setUserProfile(next);
    setProfileDraft(p=>({...p,email,hasAccount:true,isMember:true}));
    localStorage.setItem("charismaProfile",JSON.stringify(next));
    setShowAccountSetup(false);
    setAccountNotice(services?"Firebase account created.":"Account saved for this device.");
    setAccessNotice(services?"Membership account created. Gifts and Grace Points are ready to sync with Firebase.":"Membership account saved. Gifts and Grace Points will stay with this profile on this device.");
  };

  const openStripeCheckout=(kind)=>{
    const url=STRIPE_LINKS[kind];
    if(!url){
      setAccessNotice("Stripe checkout is ready in the app. Add your Stripe Payment Link to turn this on.");
      return;
    }
    window.location.href=url;
  };

  const upgradeMembership=()=>{
    openStripeCheckout("membership");
  };

  const recordRevealStart=()=>{
    setAccessNotice("");
    if(hasUnlimitedAccess)return true;
    const now=Date.now();
    const current=now-activeAccess.windowStart>=ACCESS_RESET_MS?{windowStart:now,callsUsed:0}:activeAccess;
    if(current.callsUsed>=FREE_REVEAL_LIMIT){
      setRevealAccess(current);
      localStorage.setItem("charismaRevealAccess",JSON.stringify(current));
      setAccessNotice("Your free reveal access is done for today. Wait 24 hours or get membership for unlimited searching.");
      return false;
    }
    const next={...current,callsUsed:current.callsUsed+1};
    setRevealAccess(next);
    localStorage.setItem("charismaRevealAccess",JSON.stringify(next));
    return true;
  };

  const milesBetween=(lat1,lng1,lat2,lng2)=>{
    const r=3958.8;
    const dLat=(lat2-lat1)*Math.PI/180;
    const dLng=(lng2-lng1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return r*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };

  const loadNearbyRestaurants=async(lat,lng)=>{
    setRestaurantStatus("loading");
    setRestaurantError("");
    try{
      const query=`[out:json][timeout:14];(node["amenity"~"restaurant|cafe|bar"](around:5000,${lat},${lng});way["amenity"~"restaurant|cafe|bar"](around:5000,${lat},${lng}););out center 28;`;
      const res=await fetch("https://overpass-api.de/api/interpreter",{method:"POST",body:query});
      if(!res.ok)throw new Error("Restaurant lookup failed");
      const data=await res.json();
      const mapped=(data.elements||[])
        .map((el,i)=>{
          const tags=el.tags||{};
          const rLat=el.lat||el.center?.lat;
          const rLng=el.lon||el.center?.lon;
          if(!tags.name||!rLat||!rLng)return null;
          const miles=milesBetween(lat,lng,rLat,rLng);
          return {
            id:`osm-${el.type}-${el.id}`,
            name:tags.name,
            cuisine:tags.cuisine?tags.cuisine.split(";").slice(0,2).map(s=>s.trim()).join(" · "):(tags.amenity==="cafe"?"Cafe":tags.amenity==="bar"?"Bar":"Restaurant"),
            rating:"local",
            price:tags["payment:credit_cards"]==="yes"?"$$":"$–$$",
            distance:`${miles.toFixed(1)} mi`,
            vibe:tags.amenity==="cafe"?"Coffee · Casual":tags.amenity==="bar"?"Drinks · Social":"Local · Date spot",
            times:["6:00 PM","6:30 PM","7:30 PM","8:30 PM"],
            neighborhood:tags["addr:street"]||tags["addr:city"]||"Nearby",
            lat:rLat,
            lng:rLng
          };
        })
        .filter(Boolean)
        .sort((a,b)=>parseFloat(a.distance)-parseFloat(b.distance))
        .slice(0,12);
      if(mapped.length)setRestaurants(mapped);
      else throw new Error("No nearby restaurants found");
      setRestaurantStatus("loaded");
    }catch(err){
      setRestaurants(RESTAURANTS);
      setRestaurantStatus("error");
      setRestaurantError("Using sample restaurants for now. Real places could not load.");
    }
  };

  const stopCamera=()=>{
    if(streamRef.current){
      streamRef.current.getTracks().forEach(track=>track.stop());
      streamRef.current=null;
    }
    if(videoRef.current)videoRef.current.srcObject=null;
    setCameraStatus("idle");
  };

  const ensureCameraLive=async()=>{
    if(cameraIsLive()){
      setCameraStatus("live");
      attachCameraStream();
      return true;
    }
    return await startCamera();
  };

  const startCamera=async()=>{
    if(!navigator.mediaDevices?.getUserMedia){
      setCameraStatus("error");
      setCameraError("Camera preview is not supported in this browser.");
      return false;
    }
    setCameraStatus("requesting");
    setCameraError("");
    try{
      const stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"user",width:{ideal:640},height:{ideal:960}},
        audio:false
      });
      if(streamRef.current&&streamRef.current!==stream){
        streamRef.current.getTracks().forEach(track=>track.stop());
      }
      streamRef.current=stream;
      stream.getVideoTracks().forEach(track=>{
        track.onended=()=>setCameraStatus("idle");
      });
      attachCameraStream();
      setCameraStatus("live");
      return true;
    }catch(err){
      setCameraStatus("error");
      setCameraError(err?.name==="NotAllowedError"?"Camera permission was blocked. Allow camera access in the browser to preview yourself.":"Could not open the camera on this device.");
      return false;
    }
  };

  const confirmLocation=async()=>{
    if(!navigator.geolocation){
      setLocationStatus("error");
      setLocationError("Location is not supported in this browser.");
      return false;
    }
    setLocationStatus("requesting");
    setLocationError("");
    return new Promise(resolve=>{
      navigator.geolocation.getCurrentPosition(
        pos=>{
          setLocation({
            lat:pos.coords.latitude,
            lng:pos.coords.longitude,
            accuracy:pos.coords.accuracy
          });
          loadNearbyRestaurants(pos.coords.latitude,pos.coords.longitude);
          setLocationStatus("confirmed");
          resolve(true);
        },
        err=>{
          setLocationStatus("error");
          setLocationError(err?.code===1?"Location permission was blocked. Allow location access to confirm your region before matching.":"Could not confirm your location. Try again before starting.");
          resolve(false);
        },
        {enableHighAccuracy:false,timeout:10000,maximumAge:300000}
      );
    });
  };

  const confirmRegionOnly=()=>{
    setLocation(null);
    setLocationError("");
    setLocationStatus("confirmed");
  };

  const makeRoomId=()=>`charisma-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;

  // ── Daily.co video config ──
  const DAILY_DOMAIN="trycharisma.daily.co";
  const DAILY_ROOM_WORKER="https://charisma-rooms.bthorpe99.workers.dev";
  const buildJitsiUrl=room=>`https://meet.jit.si/${encodeURIComponent(room)}#config.prejoinPageEnabled=false&config.disableDeepLinking=true&config.startWithAudioMuted=false&config.startWithVideoMuted=false&interfaceConfig.SHOW_JITSI_WATERMARK=false`;
  const createDailyRoom=async room=>{
    if(!DAILY_ROOM_WORKER||DAILY_ROOM_WORKER.indexOf("PASTE_YOUR_WORKER")===0){return buildJitsiUrl(room);}
    try{
      const res=await fetch(DAILY_ROOM_WORKER,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({room})});
      if(!res.ok)throw new Error("room create failed");
      const data=await res.json();
      return data.url||`https://${DAILY_DOMAIN}/${encodeURIComponent(room)}`;
    }catch(err){return buildJitsiUrl(room);}
  };

  const toMatchRad=n=>n*Math.PI/180;
  const matchMilesBetween=(a,b)=>{
    if(!a||!b)return 0;
    const R=3958.8;
    const dLat=toMatchRad(b.lat-a.lat);
    const dLng=toMatchRad(b.lng-a.lng);
    const lat1=toMatchRad(a.lat);
    const lat2=toMatchRad(b.lat);
    const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
    return 2*R*Math.asin(Math.min(1,Math.sqrt(h)));
  };

  const getMatchUid=()=>{
    const services=getFirebaseServices();
    const uid=services?.auth?.currentUser?.uid;
    if(uid)return uid;
    let guest=localStorage.getItem("charismaGuestId");
    if(!guest){
      guest=`guest-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;
      localStorage.setItem("charismaGuestId",guest);
    }
    return guest;
  };

  const leaveMatchQueue=async()=>{
    matchUnsubRef.current?.();
    matchUnsubRef.current=null;
    const services=getFirebaseServices();
    if(!services?.db)return;
    try{
      const uid=getMatchUid();
      await services.db.collection("matchRequests").doc(uid).set({
        status:"left",
        updatedAt:window.firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});
    }catch(err){}
  };

  const handleMatchedRequest=data=>{
    const room=data.room||makeRoomId();
    const callUrl=data.callUrl||buildJitsiUrl(room);
    setMatchRoom(room);
    setMatchCallUrl(callUrl);
    setMatchedProfileName(data.matchedName||"someone nearby");
    setMatchStatus("matched");
    setSafetyNotice(`Matched with ${data.matchedName||"someone nearby"}. Your real video room is loading inside Charisma.`);
    stopCamera();
    setScreen("call");
  };

  const startNearbyMatch=async()=>{
    const services=getFirebaseServices();
    setMatchStatus("searching");
    setMatchError("");
    setMatchRoom("");
    setMatchCallUrl("");
    setMatchedProfileName("");
    if(!services?.db){
      setMatchStatus("error");
      setMatchError("Firebase is not ready yet. Refresh and try matching again.");
      setScreen("connecting");
      return false;
    }
    const uid=getMatchUid();
    const requestRef=services.db.collection("matchRequests").doc(uid);
    const profileName=userProfile.name||"Guest";
    const myLocation=location?{lat:location.lat,lng:location.lng}:null;
    try{
      await leaveMatchQueue();
      const waiting=await services.db.collection("matchRequests").where("status","==","waiting").limit(30).get();
      const candidates=waiting.docs
        .map(doc=>({id:doc.id,...doc.data()}))
        .filter(item=>item.id!==uid&&item.language===language&&item.region===region)
        .filter(item=>!myLocation||!item.location||matchMilesBetween(myLocation,item.location)<=50);
      const candidate=candidates[0];
      if(candidate){
        const room=makeRoomId();
        const callUrl=await createDailyRoom(room);
        const matchId=`match-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,8)}`;
        await services.db.runTransaction(async tx=>{
          const candidateRef=services.db.collection("matchRequests").doc(candidate.id);
          const candidateSnap=await tx.get(candidateRef);
          if(!candidateSnap.exists||candidateSnap.data().status!=="waiting")throw new Error("That match was just taken. Searching again.");
          const matchRef=services.db.collection("matches").doc(matchId);
          const common={
            matchId,
            room,
            callUrl,
            language,
            region,
            status:"matched",
            updatedAt:window.firebase.firestore.FieldValue.serverTimestamp()
          };
          tx.set(matchRef,{
            id:matchId,
            room,
            callUrl,
            language,
            region,
            status:"ready",
            participants:[uid,candidate.id],
            names:{[uid]:profileName,[candidate.id]:candidate.name||"Nearby match"},
            createdAt:window.firebase.firestore.FieldValue.serverTimestamp()
          });
          tx.set(requestRef,{...common,uid,name:profileName,matchedName:candidate.name||"Nearby match"},{merge:true});
          tx.set(candidateRef,{...common,matchedName:profileName},{merge:true});
        });
        handleMatchedRequest({room,callUrl,matchedName:candidate.name||"Nearby match"});
        return true;
      }
      await requestRef.set({
        uid,
        name:profileName,
        role:userProfile.role,
        language,
        region,
        location:myLocation,
        status:"waiting",
        createdAt:window.firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt:window.firebase.firestore.FieldValue.serverTimestamp()
      },{merge:true});
      matchUnsubRef.current=requestRef.onSnapshot(doc=>{
        const data=doc.data();
        if(data?.status==="matched")handleMatchedRequest(data);
      },err=>{
        setMatchStatus("error");
        setMatchError(err?.message||"Matching could not connect. Try again.");
      });
      setSafetyNotice("Searching nearby now. Keep this screen open while Charisma looks for someone close.");
      setScreen("connecting");
      return true;
    }catch(err){
      setMatchStatus("error");
      setMatchError(err?.message||"Matching could not start. Try again.");
      setScreen("connecting");
      return false;
    }
  };

  const saveDatePlan=(stayInCall=false)=>{

    setDatePlans(prev=>{

      return next;
    });
    setBookingDone(true);
    setSafetyNotice(`Date plan saved: ${selectedRest.name} at ${selectedTime}.`);
    if(stayInCall)setShowDatePlanner(false);
  };

  const keepSearchingAfterBooking=()=>{
    setSelectedRest(null);
    setSelectedTime(null);
    setBookingDone(false);
    goNext();

  const sendGift=g=>{
    if(coins<g.price)return;
    setCoins(c=>c-g.price);
    setSentGifts(p=>[...p,g]);
    setUserProfile(p=>({
      ...p,

    }));
    setFloating(p=>[...p,{...g,key:Date.now()}]);
    setPulseRing(true);
    setTimeout(()=>setPulseRing(false),900);
  };

  const nextUnblockedProfile=()=>{
    const blocked=new Set(blockedProfiles);
    for(let i=0;i<PROFILES.length;i++){
      profileIndex=(profileIndex+1)%PROFILES.length;
      if(!blocked.has(PROFILES[profileIndex].id))return PROFILES[profileIndex];

    return PROFILES[profileIndex];
  };

  const reportProfile=()=>{

    setSafetyNotice(`${profile.name} was reported. Our safety team will review this when moderation is connected.`);
  };

  const blockProfile=()=>{
    const next=[...new Set([...blockedProfiles,profile.id])];
    setBlockedProfiles(next);
    localStorage.setItem("charismaBlockedProfiles",JSON.stringify(next));
    setSafetyNotice(`${profile.name} was blocked and removed from your rotation.`);
    goNext();
  };

  const endCall=()=>{
    setSafetyNotice("Call ended.");
    goHome();
  };

  const startOver=async()=>{
    if(!profileComplete||!language||!region||locationStatus!=="confirmed")return;
    if(!await ensureCameraLive())return;
    if(!recordRevealStart())return;
    profileIndex=-1;
    setProfile(nextUnblockedProfile());
    setSentGifts([]);setShowGifts(false);setShowDatePlanner(false);
    setSelectedRest(null);setSelectedTime(null);setBookingDone(false);
    await startNearbyMatch();
  };

  const goNext=async()=>{
    clearInterval(timerRef.current);clearInterval(blurRef.current);
    await leaveMatchQueue();
    if(!await ensureCameraLive()){
      setScreen("home");
      return;
    }
    if(!recordRevealStart()){
      setScreen("home");
      return;
    }
    setProfile(nextUnblockedProfile());
    setSentGifts([]);setFloating([]);setShowGifts(false);setShowDatePlanner(false);
    setSelectedRest(null);setSelectedTime(null);setBookingDone(false);
    await startNearbyMatch();
  };

  const goKeep=()=>{
    clearInterval(timerRef.current);clearInterval(blurRef.current);
    setKept(p=>[...p,profile]);
    setShowGifts(false);setShowDatePlanner(false);
    if(!bookingDone){
      setSelectedRest(null);setSelectedTime(null);
    }
    setScreen("end");
  };

  const goHome=()=>{
    clearInterval(timerRef.current);clearInterval(blurRef.current);
    leaveMatchQueue();
    stopCamera();
    setScreen("home");
  };

  const activeQuestionIndex=Math.floor(callTime/8)%CALL_QUESTIONS.length;
  const activeQuestion=CALL_QUESTIONS[activeQuestionIndex];
  const selectedLanguage=LANGUAGES.find(l=>l.id===language);
  const availableRegions=language?REGIONS_BY_LANGUAGE[language]:[];
  const setupComplete=Boolean(profileComplete&&language&&region&&locationStatus==="confirmed"&&cameraStatus==="live");
  const locationLabel=location?`${location.lat.toFixed(2)}, ${location.lng.toFixed(2)}`:"region only";

  return(
    <div style={{minHeight:"100vh",background:"rgba(18,13,16,0.72)",fontFamily:body,color:T.text,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:screen==="home"?"flex-start":"center",overflowX:"hidden",overflowY:screen==="home"?"auto":"hidden",position:"relative"}}>

        style={{position:"fixed",inset:0,width:"100%",height:"100vh",objectFit:"cover",pointerEvents:"none",zIndex:0,opacity:0.34,filter:"saturate(0.9) brightness(0.65)"}}

              <button className="btn" onClick={()=>setLegalModal(null)} style={{width:34,height:34,borderRadius:"50%",background:"rgba(196,146,138,0.1)",border:"1px solid rgba(196,146,138,0.18)",color:T.cream,fontSize:18}}>×</button>

            ))}

      <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:400,padding:"0 20px"}}>
        {safetyNotice&&(

            {safetyNotice}

        {screen==="connecting"&&(
          <div className="glass" style={{padding:"28px 24px",textAlign:"center",animation:"fadeUp 0.45s ease"}}>
            <div style={{width:92,height:92,borderRadius:"50%",margin:"0 auto 22px",border:"1px solid rgba(196,146,138,0.2)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 55px rgba(196,146,138,0.18)",position:"relative"}}>
              <div style={{position:"absolute",inset:8,borderRadius:"50%",border:"1px solid rgba(122,181,201,0.3)",animation:"liveGlow 1.8s ease-in-out infinite"}}/>
              <span style={{fontFamily:sans,fontSize:18,fontWeight:600,letterSpacing:"0.18em",color:T.rose}}>LIVE</span>
            </div>
            <p style={{fontFamily:sans,fontSize:10,letterSpacing:"0.24em",textTransform:"uppercase",color:"rgba(196,146,138,0.52)",marginBottom:10}}>
              {matchStatus==="matched"?"Nearby match ready":matchStatus==="error"?"Matching paused":"Finding someone nearby"}
            </p>
            <h2 style={{fontFamily:serif,fontSize:34,fontWeight:300,lineHeight:1.05,color:T.cream,marginBottom:12}}>
              {matchStatus==="matched"?`Matched with ${matchedProfileName}`:"Looking in your area"}
            </h2>
            <p style={{fontFamily:body,fontStyle:"italic",fontSize:14,lineHeight:1.65,color:T.muted,marginBottom:18}}>
              {matchStatus==="error"?matchError:`${selectedLanguage?.name||"Your language"} - ${region||"your region"} - ${locationLabel}. Keep this open while another close match starts.`}

              Cancel search
            </button>

        {/* ── HOME ── */}
        {screen==="home"&&(
          <div style={{animation:"fadeUp 0.6s ease",textAlign:"center"}}>
            <div style={{fontFamily:body,fontStyle:"italic",fontSize:13,color:"rgba(196,146,138,0.45)",letterSpacing:"0.22em",marginBottom:8}}>— where attraction begins —</div>
            <h1 style={{fontFamily:serif,fontSize:88,fontWeight:300,lineHeight:0.88,color:T.cream,marginBottom:10,letterSpacing:"-0.02em",textShadow:"0 2px 60px rgba(196,146,138,0.18)",display:"flex",alignItems:"center",justifyContent:"center",gap:0}}>
              <span>Char</span><RoseI/><span>sma</span>
            </h1>
            <div style={{display:"flex",alignItems:"center",gap:12,justifyContent:"center",marginBottom:18}}>
              <div style={{width:40,height:"1px",background:"rgba(196,146,138,0.25)"}}/>
              <span style={{color:"rgba(196,146,138,0.4)",fontSize:14}}>❧</span>
              <div style={{width:40,height:"1px",background:"rgba(196,146,138,0.25)"}}/>
            </div>
            <p style={{fontFamily:body,fontStyle:"italic",fontSize:16,color:T.muted,lineHeight:1.7,marginBottom:40}}>
              No profiles. No swiping.<br/>Just your voice, your presence,<br/>and the slow reveal.
            </p>
            <div style={{display:"inline-flex",alignItems:"center",gap:9,padding:"9px 22px",borderRadius:100,background:"rgba(201,168,122,0.08)",border:"1px solid rgba(201,168,122,0.22)",marginBottom:36,fontSize:13,color:T.gold,fontFamily:sans,fontWeight:500,letterSpacing:"0.06em"}}>❧ {coins.toLocaleString()} grace points</div>
            <div className="glass" style={{padding:"22px 24px",marginBottom:30,textAlign:"left"}}>
              <p style={{fontFamily:sans,fontSize:10,letterSpacing:"0.28em",color:"rgba(196,146,138,0.45)",textTransform:"uppercase",marginBottom:18}}>The experience</p>
              {[
                ["❧","Instant connection","Drop into a live call — no waiting, no accepting"],

                {userProfile.hasAccount?(

                <div style={{padding:"0 8px",textAlign:"center"}}>
                  <div style={{fontSize:22,marginBottom:6}}>👤</div>
                  <div style={{fontFamily:sans,fontSize:8,letterSpacing:"0.14em",textTransform:"uppercase",color:"rgba(196,146,138,0.55)",lineHeight:1.4}}>
                    {cameraStatus==="requesting"?"opening":"camera off"}
                  </div>
                </div>
              )}
              <div style={{position:"absolute",left:7,bottom:7,padding:"3px 7px",borderRadius:100,background:"rgba(18,13,16,0.72)",fontFamily:sans,fontSize:8,fontWeight:600,letterSpacing:"0.12em",color:cameraStatus==="live"?"#9bd0dc":"rgba(196,146,138,0.55)",textTransform:"uppercase"}}>
                {cameraStatus==="live"?"camera live":cameraStatus==="error"?"blocked":"preview"}
              </div>
            </div>
            )}
            {/* controls */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:8}}>
              <button className="btn" onClick={goNext} style={{flex:1,padding:"15px 0",borderRadius:13,fontSize:13,color:T.muted,background:T.card,border:`1px solid ${T.border}`,letterSpacing:"0.05em"}}>pass ⟶</button>
              <button className="btn" onClick={()=>{setShowGifts(!showGifts);setShowDatePlanner(false);}} style={{flex:1,padding:"15px 0",borderRadius:13,fontSize:13,color:T.gold,background:showGifts?"rgba(201,168,122,0.14)":"rgba(201,168,122,0.07)",border:`1px solid rgba(201,168,122,${showGifts?"0.35":"0.16"})`,letterSpacing:"0.05em"}}>🌸 gift</button>
              <button className="btn" onClick={()=>{setShowDatePlanner(!showDatePlanner);setShowGifts(false);}} style={{flex:1,padding:"15px 0",borderRadius:13,fontSize:13,color:showDatePlanner?T.cream:T.muted,background:showDatePlanner?"rgba(196,146,138,0.18)":T.card,border:`1px solid ${showDatePlanner?"rgba(196,146,138,0.34)":T.border}`,letterSpacing:"0.05em"}}>plan</button>
              <button className="btn" onClick={goKeep} style={{flex:1,padding:"15px 0",borderRadius:13,fontSize:13,color:T.cream,background:"linear-gradient(145deg,#c4928a,#a06870)",boxShadow:"0 4px 24px rgba(196,146,138,0.28)",letterSpacing:"0.05em"}}>keep ❧</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:8}}>
              <button className="btn" onClick={reportProfile} style={{padding:"10px 0",borderRadius:11,fontSize:11,color:T.muted,background:"rgba(196,146,138,0.06)",border:"1px solid rgba(196,146,138,0.12)",letterSpacing:"0.06em"}}>Report</button>
              <button className="btn" onClick={blockProfile} style={{padding:"10px 0",borderRadius:11,fontSize:11,color:T.muted,background:"rgba(196,146,138,0.06)",border:"1px solid rgba(196,146,138,0.12)",letterSpacing:"0.06em"}}>Block</button>
              <button className="btn" onClick={endCall} style={{padding:"10px 0",borderRadius:11,fontSize:11,color:"rgba(245,236,230,0.86)",background:"rgba(212,160,168,0.12)",border:"1px solid rgba(212,160,168,0.24)",letterSpacing:"0.06em"}}>End</button>
            </div>
            {showDatePlanner&&(
              <div className="glass" style={{padding:16,marginBottom:8,animation:"fadeUp 0.22s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:12}}>
                  <span style={{fontFamily:serif,fontStyle:"italic",fontSize:16,color:T.cream}}>plan while you talk</span>
                  <span style={{fontFamily:sans,fontSize:10,letterSpacing:"0.16em",textTransform:"uppercase",color:"rgba(196,146,138,0.45)"}}>live meet</span>
                </div>
                <div style={{display:"flex",gap:7,marginBottom:11}}>
                  {["Tonight","Tomorrow","This Weekend"].map(d=>(
                    <button key={d} onClick={()=>setBookingDate(d)} className="btn" style={{flex:1,padding:"8px 4px",borderRadius:10,fontSize:11,fontWeight:500,background:bookingDate===d?"#c4928a":"rgba(196,146,138,0.07)",color:bookingDate===d?"#fff":T.muted,border:bookingDate===d?"none":"1px solid rgba(196,146,138,0.12)",transition:"all 0.2s"}}>{d}</button>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                  <span style={{fontFamily:body,fontStyle:"italic",fontSize:12,color:T.muted}}>Party of</span>
                  {[2,3,4].map(n=>(
                    <button key={n} onClick={()=>setBookingParty(n)} className="btn" style={{width:30,height:30,borderRadius:"50%",fontSize:13,fontWeight:600,background:bookingParty===n?"#c4928a":"rgba(196,146,138,0.07)",color:bookingParty===n?"#fff":T.muted,border:bookingParty===n?"none":"1px solid rgba(196,146,138,0.12)",transition:"all 0.2s"}}>{n}</button>
                  ))}
                </div>
                <p style={{fontFamily:sans,fontSize:10,letterSpacing:"0.2em",color:"rgba(196,146,138,0.4)",textTransform:"uppercase",marginBottom:6}}>Nearby · {location?userProfile.city||region:profile.city}</p>
                <p style={{fontFamily:body,fontStyle:"italic",fontSize:12,color:restaurantStatus==="error"?"rgba(212,160,168,0.72)":T.muted,marginBottom:10}}>
                  {restaurantStatus==="loading"?"Finding real nearby restaurants...":restaurantStatus==="loaded"?"Pick a place together while the meet is live.":restaurantStatus==="error"?restaurantError:"Choose a place for the date."}
                </p>
                <div className="scroll-thin" style={{maxHeight:185,overflowY:"auto",paddingRight:2}}>
                  {restaurants.map(r=>(
                    <RestaurantCard key={r.id} r={r} selected={selectedRest?.id===r.id} onSelect={r=>{setSelectedRest(r);setSelectedTime(null);}}/>
                  ))}
                </div>
                {selectedRest&&(
                  <div style={{marginTop:10,animation:"fadeUp 0.2s ease"}}>
                    <p style={{fontFamily:serif,fontStyle:"italic",fontSize:15,color:T.cream,marginBottom:2}}>{selectedRest.name}</p>
                    <p style={{fontFamily:body,fontStyle:"italic",fontSize:12,color:T.muted,marginBottom:2}}>Choose a time for {bookingDate.toLowerCase()}</p>
                    <TimeSlots times={selectedRest.times} selected={selectedTime} onSelect={setSelectedTime}/>
                  </div>
                )}
                {selectedRest&&selectedTime&&(
                  <button className="btn" onClick={()=>saveDatePlan(true)} style={{width:"100%",marginTop:12,padding:"14px 0",borderRadius:13,fontSize:13,color:T.cream,letterSpacing:"0.07em",background:"linear-gradient(145deg,#c4928a,#a06870)",boxShadow:"0 6px 28px rgba(196,146,138,0.24)",animation:"fadeUp 0.25s ease"}}>
                    Save plan · {bookingParty} guests · {selectedTime}
                  </button>
                )}
              </div>
            )}
            {showGifts&&(
              <div className="glass" style={{padding:18,animation:"fadeUp 0.22s ease"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <span style={{fontFamily:serif,fontStyle:"italic",fontSize:16,color:T.cream}}>a grace gift</span>
                  <span style={{fontFamily:sans,fontSize:13,fontWeight:500,color:T.gold}}>{userProfile.name||"Guest"} · ❧ {coins.toLocaleString()}</span>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                  {GIFTS.map(g=>{
                    const ok=coins>=g.price;
                    return(
                      <button key={g.id} className="btn" onClick={()=>sendGift(g)} style={{padding:"12px 6px",borderRadius:13,textAlign:"center",color:T.cream,background:ok?`${g.color}15`:"rgba(255,255,255,0.02)",border:`1px solid ${ok?g.color+"3a":"rgba(196,146,138,0.08)"}`,opacity:ok?1:0.28}}>
                        <div style={{fontSize:22,marginBottom:5}}>{g.emoji}</div>
                        <div style={{fontFamily:sans,fontSize:11,fontWeight:500}}>{g.name}</div>
                        <div style={{fontFamily:sans,fontSize:11,color:T.gold,marginTop:3}}>❧ {g.price}</div>
                      </button>
                    );
                  })}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginTop:10}}>
                  {GRACE_PACKS.map(pack=>(
                    <button key={pack.id} className="btn" onClick={()=>openStripeCheckout(pack.id)} style={{padding:"9px 4px",borderRadius:10,fontSize:10,color:T.gold,background:"rgba(201,168,122,0.08)",border:"1px solid rgba(201,168,122,0.16)",lineHeight:1.25}}>
                      <div style={{fontWeight:600}}>{pack.price}</div>
                      <div style={{fontFamily:body,fontStyle:"italic",color:T.muted}}>{pack.points.toLocaleString()} pts</div>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── END / MATCH ── */}
        {screen==="end"&&!bookingDone&&(
          <div style={{animation:"fadeUp 0.5s ease"}}>
            <div style={{textAlign:"center",marginBottom:26}}>
              <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"center",marginBottom:14}}>
                <div style={{width:50,height:"1px",background:"rgba(196,146,138,0.3)"}}/>
                <span style={{color:T.rose,fontSize:20,animation:"pop 0.5s ease"}}>❧</span>
                <div style={{width:50,height:"1px",background:"rgba(196,146,138,0.3)"}}/>
              </div>
              <h2 style={{fontFamily:serif,fontSize:34,fontWeight:300,color:T.cream,marginBottom:8}}>You kept {profile.name}</h2>
              <p style={{fontFamily:body,fontStyle:"italic",color:T.muted,fontSize:14,lineHeight:1.7}}>
                When they keep you back, it becomes<br/><span style={{color:T.rose}}>something worth pursuing.</span>
              </p>
              {sentGifts.length>0&&<p style={{fontFamily:sans,fontSize:12,color:T.gold,marginTop:10}}>{sentGifts.map(g=>g.emoji).join("  ")}</p>}
            </div>
            <div className="glass" style={{padding:"16px 18px",marginBottom:12}}>
              <p style={{fontFamily:sans,fontSize:10,letterSpacing:"0.24em",color:"rgba(196,146,138,0.4)",textTransform:"uppercase",marginBottom:12}}>Plan the evening</p>
              <div style={{display:"flex",gap:7,marginBottom:12}}>
                {["Tonight","Tomorrow","This Weekend"].map(d=>(
                  <button key={d} onClick={()=>setBookingDate(d)} className="btn" style={{flex:1,padding:"9px 4px",borderRadius:10,fontSize:12,fontWeight:500,background:bookingDate===d?"#c4928a":"rgba(196,146,138,0.07)",color:bookingDate===d?"#fff":T.muted,border:bookingDate===d?"none":"1px solid rgba(196,146,138,0.12)",transition:"all 0.2s"}}>{d}</button>
                ))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontFamily:body,fontStyle:"italic",fontSize:13,color:T.muted}}>Party of</span>
                {[2,3,4].map(n=>(
                  <button key={n} onClick={()=>setBookingParty(n)} className="btn" style={{width:34,height:34,borderRadius:"50%",fontSize:14,fontWeight:600,background:bookingParty===n?"#c4928a":"rgba(196,146,138,0.07)",color:bookingParty===n?"#fff":T.muted,border:bookingParty===n?"none":"1px solid rgba(196,146,138,0.12)",transition:"all 0.2s"}}>{n}</button>
                ))}
              </div>
            </div>
            <p style={{fontFamily:sans,fontSize:10,letterSpacing:"0.24em",color:"rgba(196,146,138,0.4)",textTransform:"uppercase",marginBottom:6}}>Nearby · {location?userProfile.city||region:profile.city}</p>
            <p style={{fontFamily:body,fontStyle:"italic",fontSize:12,color:restaurantStatus==="error"?"rgba(212,160,168,0.72)":T.muted,marginBottom:10}}>
              {restaurantStatus==="loading"?"Finding real nearby restaurants…":restaurantStatus==="loaded"?"Real places loaded from OpenStreetMap.":restaurantStatus==="error"?restaurantError:"Choose a place for the date."}
            </p>
            <div className="scroll-thin" style={{maxHeight:290,overflowY:"auto",paddingRight:2}}>
              {restaurants.map(r=>(
                <RestaurantCard key={r.id} r={r} selected={selectedRest?.id===r.id} onSelect={r=>{setSelectedRest(r);setSelectedTime(null);}}/>
              ))}
            </div>
            {selectedRest&&(
              <div className="glass" style={{padding:"16px 18px",marginTop:10,animation:"fadeUp 0.2s ease"}}>
                <p style={{fontFamily:serif,fontStyle:"italic",fontSize:15,color:T.cream,marginBottom:2}}>{selectedRest.name}</p>
                <p style={{fontFamily:body,fontStyle:"italic",fontSize:12,color:T.muted,marginBottom:2}}>Choose a time for {bookingDate.toLowerCase()}</p>
                <TimeSlots times={selectedRest.times} selected={selectedTime} onSelect={setSelectedTime}/>
              </div>
            )}
            {selectedRest&&selectedTime&&(
              <button className="btn" onClick={saveDatePlan} style={{width:"100%",marginTop:12,padding:"17px 0",borderRadius:14,fontSize:14,color:T.cream,letterSpacing:"0.07em",background:"linear-gradient(145deg,#c4928a,#a06870)",boxShadow:"0 6px 32px rgba(196,146,138,0.28)",animation:"fadeUp 0.25s ease"}}>
                Reserve · {bookingParty} guests · {selectedTime} ❧
              </button>
            )}
            <div style={{display:"flex",gap:8,marginTop:11}}>
              <button className="btn" onClick={()=>setShowDatePlanner(false)} style={{flex:1,padding:"13px 0",borderRadius:13,fontSize:13,color:T.cream,background:T.card,border:`1px solid ${T.border}`,letterSpacing:"0.04em"}}>Back to call</button>
              <button className="btn" onClick={goHome} style={{flex:1,padding:"13px 0",borderRadius:13,fontSize:13,color:T.muted,background:"transparent",border:"1px solid rgba(196,146,138,0.08)",fontFamily:body,fontStyle:"italic"}}>Back home</button>
            </div>
          </div>
        )}

        {/* ── BOOKING CONFIRMED ── */}
        {screen==="end"&&bookingDone&&(
          <div style={{textAlign:"center",animation:"fadeUp 0.5s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"center",marginBottom:18}}>
              <div style={{width:40,height:"1px",background:"rgba(196,146,138,0.25)"}}/>
              <span style={{color:T.rose,fontSize:22,animation:"pop 0.5s ease"}}>❧</span>
              <div style={{width:40,height:"1px",background:"rgba(196,146,138,0.25)"}}/>
            </div>
            <h2 style={{fontFamily:serif,fontSize:30,fontWeight:300,color:T.cream,marginBottom:8}}>The evening is set.</h2>
            <p style={{fontFamily:body,fontStyle:"italic",color:T.muted,fontSize:14,lineHeight:1.8,marginBottom:28}}>
              Reservation request sent to<br/>
              <strong style={{fontFamily:serif,color:T.cream,fontStyle:"normal",fontWeight:400}}>{selectedRest?.name}</strong><br/>
              <span style={{fontSize:13}}>{bookingDate} · {selectedTime} · party of {bookingParty}</span>
            </p>
            <div className="glass" style={{padding:"18px 22px",marginBottom:24,textAlign:"left"}}>
              <p style={{fontFamily:sans,fontSize:10,letterSpacing:"0.24em",color:"rgba(196,146,138,0.4)",textTransform:"uppercase",marginBottom:14}}>Reservation details</p>
              {[["Where",selectedRest?.name],["When",`${bookingDate} at ${selectedTime}`],["Guests",`${bookingParty} people`],["Status","Awaiting confirmation"]].map(([lbl,val])=>(
                <div key={lbl} style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"baseline"}}>
                  <span style={{fontFamily:sans,fontSize:11,color:T.muted,letterSpacing:"0.06em"}}>{lbl}</span>
                  <span style={{fontFamily:body,fontStyle:"italic",fontSize:13,color:T.cream}}>{val}</span>
                </div>
              ))}
            </div>
            <div className="glass" style={{padding:"14px 16px",marginBottom:16,textAlign:"left",border:"1px solid rgba(122,181,201,0.22)",background:"rgba(122,181,201,0.07)"}}>
              <p style={{fontFamily:sans,fontSize:10,letterSpacing:"0.2em",color:"rgba(223,247,247,0.68)",textTransform:"uppercase",marginBottom:8}}>Safety reminder</p>
              <p style={{fontFamily:body,fontStyle:"italic",fontSize:13,lineHeight:1.5,color:T.muted}}>Meet in public, keep your exact address private, and share your plans with someone you trust.</p>
            </div>
            <button className="btn" onClick={keepSearchingAfterBooking} style={{width:"100%",padding:"16px 0",borderRadius:13,fontSize:14,color:T.cream,background:"linear-gradient(145deg,#c4928a,#a06870)",boxShadow:"0 6px 32px rgba(196,146,138,0.25)",letterSpacing:"0.07em",marginBottom:10}}>Keep searching ❧</button>
            <button className="btn" onClick={goHome} style={{width:"100%",padding:"12px 0",borderRadius:13,fontSize:13,color:T.muted,background:"transparent",border:"none",fontFamily:body,fontStyle:"italic"}}>Back home</button>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
